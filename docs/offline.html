<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sem Conexão - Canteiro Saudável</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #0a7ea4 0%, #065a7a 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    
    .container {
      background: white;
      border-radius: 24px;
      padding: 48px 32px;
      max-width: 480px;
      width: 100%;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    }
    
    .icon {
      width: 120px;
      height: 120px;
      margin: 0 auto 24px;
      background: #f5f5f5;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 64px;
    }
    
    h1 {
      font-size: 28px;
      color: #11181C;
      margin-bottom: 16px;
      font-weight: 700;
    }
    
    p {
      font-size: 16px;
      color: #687076;
      line-height: 1.6;
      margin-bottom: 32px;
    }
    
    .button {
      background: #0a7ea4;
      color: white;
      border: none;
      border-radius: 12px;
      padding: 16px 32px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      display: inline-block;
      text-decoration: none;
    }
    
    .button:hover {
      background: #065a7a;
      transform: scale(0.98);
    }
    
    .button:active {
      transform: scale(0.95);
    }
    
    .features {
      margin-top: 32px;
      padding-top: 32px;
      border-top: 1px solid #E5E7EB;
    }
    
    .feature {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
      text-align: left;
    }
    
    .feature-icon {
      width: 40px;
      height: 40px;
      background: #E6F4FE;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }
    
    .feature-text {
      font-size: 14px;
      color: #687076;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">📡</div>
    <h1>Você está offline</h1>
    <p>
      Não foi possível conectar à internet. Verifique sua conexão e tente novamente.
    </p>
    <button class="button" onclick="window.location.reload()">
      Tentar Novamente
    </button>
    
    <div class="features">
      <div class="feature">
        <div class="feature-icon">✅</div>
        <div class="feature-text">
          <strong>Dados salvos localmente</strong><br>
          Seus check-ins e registros estão seguros
        </div>
      </div>
      <div class="feature">
        <div class="feature-icon">🔄</div>
        <div class="feature-text">
          <strong>Sincronização automática</strong><br>
          Quando reconectar, tudo será enviado
        </div>
      </div>
      <div class="feature">
        <div class="feature-icon">📱</div>
        <div class="feature-text">
          <strong>Funciona offline</strong><br>
          Continue usando as funcionalidades principais
        </div>
      </div>
    </div>
  </div>
</body>
</html>
