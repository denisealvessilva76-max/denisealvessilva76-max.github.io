<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ergonomia & Alongamento — Canteiro Saudável</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--primary:#16a34a;--primary-dark:#15803d;--primary-light:#dcfce7;--bg:#f0fdf4;--surface:#fff;--muted:#64748b;--border:#e2e8f0;--radius:16px;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif;background:var(--bg);color:#0f172a;min-height:100vh;padding-bottom:80px;}

.topbar{background:linear-gradient(135deg,#14532d,#16a34a);padding:16px 20px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:50;box-shadow:0 4px 16px rgba(21,128,61,.3);}
.back-btn{background:rgba(255,255,255,.2);border:none;color:white;width:36px;height:36px;border-radius:10px;font-size:18px;cursor:pointer;}
.topbar h1{color:white;font-size:18px;font-weight:700;flex:1;}
.voice-toggle{background:rgba(255,255,255,.2);border:none;color:white;padding:6px 12px;border-radius:10px;font-size:13px;cursor:pointer;}

.content{padding:20px;}

/* Active exercise */
.active-card{background:linear-gradient(135deg,#14532d,#16a34a);border-radius:var(--radius);padding:24px;color:white;margin-bottom:20px;display:none;}
.active-card.show{display:block;}
.ex-name{font-size:20px;font-weight:800;margin-bottom:8px;}
.ex-instruction{font-size:15px;line-height:1.7;opacity:.95;margin-bottom:20px;min-height:60px;}
.timer-ring{display:flex;justify-content:center;margin:16px 0;}
.timer-svg{width:120px;height:120px;}
.timer-text{font-size:32px;font-weight:900;fill:white;text-anchor:middle;dominant-baseline:middle;}
.timer-track{fill:none;stroke:rgba(255,255,255,.2);stroke-width:8;}
.timer-bar{fill:none;stroke:white;stroke-width:8;stroke-linecap:round;stroke-dasharray:283;stroke-dashoffset:283;transform:rotate(-90deg);transform-origin:60px 60px;transition:stroke-dashoffset .5s linear;}
.phase-label{text-align:center;font-size:13px;opacity:.8;margin-bottom:16px;letter-spacing:.5px;text-transform:uppercase;}
.ex-controls{display:flex;gap:10px;justify-content:center;}
.btn-ctrl{padding:12px 20px;border-radius:12px;border:none;font-size:14px;font-weight:600;cursor:pointer;transition:all .2s;}
.btn-skip{background:rgba(255,255,255,.2);color:white;}
.btn-pause{background:white;color:#15803d;}
.btn-stop{background:rgba(255,0,0,.25);color:white;}
.step-indicator{text-align:center;font-size:12px;opacity:.75;margin-top:12px;}

/* Category tabs */
.cat-tabs{display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;margin-bottom:20px;padding-bottom:4px;}
.cat-tabs::-webkit-scrollbar{display:none;}
.cat-tab{padding:8px 16px;border-radius:20px;border:1.5px solid var(--border);background:white;font-size:13px;font-weight:500;cursor:pointer;white-space:nowrap;transition:all .2s;}
.cat-tab.active{background:var(--primary);color:white;border-color:var(--primary);}

/* Exercise cards */
.ex-grid{display:flex;flex-direction:column;gap:12px;}
.ex-card{background:white;border-radius:var(--radius);padding:18px;border:1px solid var(--border);display:flex;gap:16px;align-items:flex-start;cursor:pointer;transition:all .2s;}
.ex-card:hover{border-color:var(--primary);box-shadow:0 4px 16px rgba(22,163,74,.15);}
.ex-emoji{font-size:40px;flex-shrink:0;width:60px;height:60px;display:flex;align-items:center;justify-content:center;background:var(--primary-light);border-radius:14px;}
.ex-info{flex:1;}
.ex-title{font-size:15px;font-weight:700;margin-bottom:4px;}
.ex-desc{font-size:13px;color:var(--muted);line-height:1.5;margin-bottom:8px;}
.ex-meta{display:flex;gap:10px;font-size:12px;}
.ex-badge{background:var(--primary-light);color:var(--primary-dark);padding:3px 10px;border-radius:20px;font-weight:600;}
.ex-start{background:var(--primary);color:white;border:none;padding:8px 16px;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;}

/* Bottom nav */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:white;border-top:1px solid var(--border);padding:8px 20px;display:flex;justify-content:space-around;}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:3px;text-decoration:none;color:var(--muted);font-size:11px;padding:6px 12px;border-radius:10px;}
.nav-item.active{color:var(--primary);}
.nav-icon{font-size:22px;}

/* Toast */
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(20px);background:#15803d;color:white;padding:12px 24px;border-radius:20px;font-size:14px;font-weight:600;opacity:0;transition:all .3s;z-index:200;pointer-events:none;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>

<div class="topbar">
  <button class="back-btn" onclick="history.back()">←</button>
  <h1>🤸 Ergonomia & Alongamento</h1>
  <button class="voice-toggle" id="voice-btn" onclick="toggleVoice()">🔊 Narração</button>
</div>

<div class="content">

  <!-- Exercício ativo -->

        <text class="timer-text" id="timer-text" x="60" y="60">--</text>

    <div class="cat-tab" onclick="filterCat('ombros',this)">Ombros</div>
    <div class="cat-tab" onclick="filterCat('coluna',this)">Coluna</div>
    <div class="cat-tab" onclick="filterCat('braços',this)">Braços / Pulsos</div>
    <div class="cat-tab" onclick="filterCat('pernas',this)">Pernas</div>
    <div class="cat-tab" onclick="filterCat('completo',this)">Sequência Completa</div>
  </div>

  <div class="ex-grid" id="ex-grid"></div>
</div>

<div class="toast" id="toast"></div>

<div class="bottom-nav">
  <a class="nav-item" href="health-check.html"><span class="nav-icon">🏠</span>Home</a>
  <a class="nav-item" href="hydration-tracker.html"><span class="nav-icon">💧</span>Água</a>
  <a class="nav-item" href="blood-pressure-history.html"><span class="nav-icon">🩺</span>Pressão</a>

// ===== STATE =====
let voiceEnabled = true;
let currentExercise = null;
let currentStepIdx = 0;
let timer = null;
let timeLeft = 0;
let isPaused = false;
let synth = window.speechSynthesis;
let currentCategory = 'todos';

// ===== VOICE =====
function toggleVoice() {
  voiceEnabled = !voiceEnabled;
  const btn = document.getElementById('voice-btn');
  btn.textContent = voiceEnabled ? '🔊 Narração' : '🔇 Mudo';
  if (!voiceEnabled && synth) synth.cancel();
}

function speak(text) {
  if (!voiceEnabled || !synth) return;
  synth.cancel();
  const utt = new SpeechSynthesisUtterance(text);
  utt.lang = 'pt-BR';
  utt.rate = 0.88;
  utt.pitch = 1.0;
  utt.volume = 1.0;
  // Try to find a Portuguese voice
  const voices = synth.getVoices();
  const ptVoice = voices.find(v => v.lang.startsWith('pt'));
  if (ptVoice) utt.voice = ptVoice;
  synth.speak(utt);
}

// ===== RENDER EXERCISES =====
function renderExercises(cat) {
  const grid = document.getElementById('ex-grid');
  const list = cat === 'todos' ? EXERCISES : EXERCISES.filter(e => e.cat === cat);
  grid.innerHTML = list.map(ex => `
    <div class="ex-card" onclick="startExercise('${ex.id}')">
      <div class="ex-emoji">${ex.emoji}</div>
      <div class="ex-info">
        <div class="ex-title">${ex.title}</div>
        <div class="ex-desc">${ex.desc}</div>
        <div class="ex-meta">
          <span class="ex-badge">⏱ ${ex.duration}</span>
          <span class="ex-badge">🎯 ${ex.parts}</span>
        </div>
      </div>
      <button class="ex-start" onclick="event.stopPropagation();startExercise('${ex.id}')">Iniciar</button>
    </div>
  `).join('');
}

function filterCat(cat, el) {
  currentCategory = cat;
  document.querySelectorAll('.cat-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  renderExercises(cat);
}

// ===== EXERCISE ENGINE =====
function startExercise(id) {
  const ex = EXERCISES.find(e => e.id === id);
  if (!ex) return;
  currentExercise = ex;
  currentStepIdx = 0;
  isPaused = false;
  document.getElementById('active-card').classList.add('show');
  document.getElementById('active-name').textContent = ex.emoji + ' ' + ex.title;
  document.getElementById('active-card').scrollIntoView({behavior:'smooth'});
  runStep();
}

function runStep() {
  if (!currentExercise) return;
  const steps = currentExercise.steps;
  if (currentStepIdx >= steps.length) { finishExercise(); return; }

  const step = steps[currentStepIdx];
  timeLeft = step.sec;

  document.getElementById('phase-label').textContent = step.phase;
  document.getElementById('active-instruction').textContent = step.text;
  document.getElementById('step-indicator').textContent =
    `Etapa ${currentStepIdx + 1} de ${steps.length}`;

  speak(step.text);
  startTimer(step.sec);
}

function startTimer(seconds) {
  clearInterval(timer);
  timeLeft = seconds;
  updateTimerUI();

  timer = setInterval(() => {
    if (isPaused) return;
    timeLeft--;
    updateTimerUI();
    if (timeLeft <= 0) {
      clearInterval(timer);
      // Announce next step
      const steps = currentExercise.steps;
      if (currentStepIdx + 1 < steps.length) {
        currentStepIdx++;
        runStep();
      } else {
        finishExercise();
      }
    }
    // Warn at 3 seconds remaining
    if (timeLeft === 3 && currentStepIdx < currentExercise.steps.length - 1) {
      setTimeout(() => speak('Próximo...'), 100);
    }
  }, 1000);
}

function updateTimerUI() {
  const step = currentExercise?.steps[currentStepIdx];
  if (!step) return;
  const total = step.sec;
  const pct = timeLeft / total;
  const circumference = 283;
  const offset = circumference * (1 - pct);

  document.getElementById('timer-text').textContent = timeLeft;
  document.getElementById('timer-bar').style.strokeDashoffset = offset;
}

function nextStep() {
  clearInterval(timer);
  if (synth) synth.cancel();
  currentStepIdx++;
  runStep();
}

function togglePause() {
  isPaused = !isPaused;
  const btn = document.getElementById('pause-btn');
  btn.textContent = isPaused ? '▶ Continuar' : '⏸ Pausar';
  if (isPaused) {
    if (synth) synth.cancel();
  } else {
    const step = currentExercise?.steps[currentStepIdx];
    if (step) speak(step.text);
  }
}

function stopExercise() {
  clearInterval(timer);
  if (synth) synth.cancel();
  currentExercise = null;
  currentStepIdx = 0;
  isPaused = false;
  document.getElementById('active-card').classList.remove('show');
  document.getElementById('pause-btn').textContent = '⏸ Pausar';
}

function finishExercise() {
  clearInterval(timer);
  document.getElementById('timer-text').textContent = '✓';
  document.getElementById('active-instruction').textContent = '🎉 Exercício concluído! Muito bem!';
  document.getElementById('phase-label').textContent = 'CONCLUÍDO';
  speak('Exercício concluído! Muito bem! Você está cuidando da sua saúde.');
  showToast('🎉 Exercício concluído!');
  setTimeout(stopExercise, 4000);
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

// ===== INIT =====
document.addEventListener('DOMContentLoaded', () => {
  renderExercises('todos');
  // Load voices
  if (synth) {
    synth.getVoices();
    speechSynthesis.onvoiceschanged = () => synth.getVoices();
  }
});
</script>
