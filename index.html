<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canteiro Saudável</title>
    <style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
    background: linear-gradient(160deg, #14532d 0%, #166534 40%, #15803d 65%, #16a34a 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
}

.login-card {
    background: white;
    border-radius: 28px;
    padding: 48px 40px;
    width: 100%;
    max-width: 420px;
    box-shadow: 0 32px 80px rgba(0,0,0,0.3), 0 8px 24px rgba(0,0,0,0.15);
}

.logo {
    text-align: center;
    margin-bottom: 36px;
}

.logo-icon {
    font-size: 56px;
    margin-bottom: 12px;
    display: block;
}

.logo h1 {
    font-size: 28px;
    color: #16a34a;
    font-weight: 900;
    letter-spacing: -0.5px;
    margin-bottom: 6px;
}

.logo p {
    color: #64748b;
    font-size: 14px;
}

.form-group {
    margin-bottom: 18px;
}

.form-group label {
    display: block;
    margin-bottom: 8px;
    font-weight: 600;
    color: #0f172a;
    font-size: 14px;
}

.form-group input {
    width: 100%;
    padding: 13px 16px;
    border: 1.5px solid #e2e8f0;
    border-radius: 12px;
    font-size: 15px;
    transition: all 0.2s;
    background: #f8fffe;
    color: #0f172a;
}

.form-group input:focus {
    outline: none;
    border-color: #16a34a;
    background: white;
    box-shadow: 0 0 0 3px rgba(22,163,74,0.12);
}

.btn-login {
    width: 100%;
    padding: 15px;
    background: linear-gradient(135deg, #22c55e 0%, #16a34a 60%, #15803d 100%);
    color: white;
    border: none;
    border-radius: 12px;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: 0 4px 12px rgba(22,163,74,0.35);
    margin-top: 8px;
    letter-spacing: 0.2px;
}

.btn-login:hover {
    transform: translateY(-1px);
    box-shadow: 0 6px 20px rgba(22,163,74,0.45);
}

.btn-login:active {
    transform: scale(0.98);
}

.btn-login:disabled {
    opacity: 0.7;
    cursor: not-allowed;
    transform: none;
}

.error-box {
    margin-top: 14px;
    padding: 12px 16px;
    background: #FEE2E2;
    color: #b91c1c;
    border-radius: 10px;
    font-size: 14px;
    display: none;
    border-left: 3px solid #ef4444;
}

.loading-box {
    margin-top: 14px;
    padding: 12px 16px;
    background: #dcfce7;
    color: #15803d;
    border-radius: 10px;
    font-size: 14px;
    display: none;
    text-align: center;
}

.divider {
    text-align: center;
    margin: 24px 0 20px;
    position: relative;
}

.divider::before {
    content: '';
    position: absolute;
    top: 50%;
    left: 0;
    right: 0;
    height: 1px;
    background: #e2e8f0;
}

.divider span {
    background: white;
    padding: 0 12px;
    color: #94a3b8;
    font-size: 13px;
    position: relative;
}

.btn-register {
    width: 100%;
    padding: 13px;
    background: white;
    color: #16a34a;
    border: 2px solid #16a34a;
    border-radius: 12px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    text-decoration: none;
    display: block;
    text-align: center;
}

.btn-register:hover {
    background: #dcfce7;
}

.footer-text {
    text-align: center;
    margin-top: 24px;
    color: #94a3b8;
    font-size: 12px;
}

/* Loading spinner */
@keyframes spin { to { transform: rotate(360deg); } }
.spinner {
    width: 18px;
    height: 18px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: white;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    display: inline-block;
    vertical-align: middle;
    margin-right: 8px;
}
    </style>
</head>
<body>

<div class="login-card">
    <div class="logo">
        <span class="logo-icon">🌱</span>
        <h1>Canteiro Saudável</h1>
        <p>Acesse sua conta de funcionário</p>
    </div>

    <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="seu@email.com" autocomplete="email">
    </div>

    <div class="form-group">
        <label for="password">Senha</label>
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
    </div>

    <button class="btn-login" id="btn-entrar" onclick="handleLogin()">Entrar</button>

    <div class="error-box" id="error-box"></div>
    <div class="loading-box" id="loading-box">
        <span class="spinner"></span> Verificando credenciais...
    </div>

    <div class="divider"><span>ou</span></div>

    <a class="btn-register" href="employee-register.html">Criar conta de funcionário</a>

    <p class="footer-text">🔒 Acesso exclusivo para trabalhadores cadastrados</p>
</div>

<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<script>
// ===== CONFIGURAÇÃO FIREBASE =====
const firebaseConfig = {
    apiKey: "AIzaSyB32S5Eac0guxy1herefub70AIAGkgF1Rw",
    authDomain: "canteiro-saudavel.firebaseapp.com",
    databaseURL: "https://canteiro-saudavel-default-rtdb.firebaseio.com",
    projectId: "canteiro-saudavel",
    storageBucket: "canteiro-saudavel.firebasestorage.app",
    messagingSenderId: "37768857073",
    appId: "1:37768857073:web:3e62666713391869813050",
};

let auth = null;
let database = null;

try {
    firebase.initializeApp(firebaseConfig);
    auth = firebase.auth();
    database = firebase.database();
} catch(e) {
    console.warn('Firebase init error:', e);
}

// ===== VERIFICAR SE JÁ ESTÁ LOGADO =====
document.addEventListener('DOMContentLoaded', () => {
    // Escutar estado de autenticação
    if (auth) {
        auth.onAuthStateChanged((user) => {
            if (user) {
                // Já logado → redirecionar para tela principal
                window.location.href = 'health-check.html';
            }
        });
    }

    // Permitir login com Enter
    document.getElementById('password').addEventListener('keydown', (e) => {
        if (e.key === 'Enter') handleLogin();
    });
    document.getElementById('email').addEventListener('keydown', (e) => {
        if (e.key === 'Enter') handleLogin();
    });
});

// ===== LOGIN =====
async function handleLogin() {
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const errorBox = document.getElementById('error-box');
    const loadingBox = document.getElementById('loading-box');
    const btn = document.getElementById('btn-entrar');

    // Limpar estados
    errorBox.style.display = 'none';
    loadingBox.style.display = 'none';

    // Validação básica
    if (!email) {
        showError('Por favor, informe seu email.');
        return;
    }
    if (!password) {
        showError('Por favor, informe sua senha.');
        return;
    }

    // Mostrar carregando
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Entrando...';
    loadingBox.style.display = 'block';

    // Tentar login via Firebase Auth
    if (auth) {
        try {
            await auth.signInWithEmailAndPassword(email, password);
            // onAuthStateChanged vai redirecionar automaticamente
        } catch (firebaseError) {
            // Se Firebase Auth falhar, tentar login via banco de dados
            await loginViaDatabase(email, password);
        }
    } else {
        // Firebase não disponível - tentar via banco de dados
        await loginViaDatabase(email, password);
    }

    // Restaurar botão se não redirecionou
    btn.disabled = false;
    btn.innerHTML = 'Entrar';
    loadingBox.style.display = 'none';
}

// Login alternativo: buscar funcionário no Realtime Database
async function loginViaDatabase(email, password) {
    if (!database) {
        showError('Serviço temporariamente indisponível. Tente novamente em instantes.');
        return;
    }
    try {
        const snapshot = await database.ref('canteiro-saudavel/employees').once('value');
        const employees = snapshot.val() || {};
        let found = null;
        Object.entries(employees).forEach(([uid, emp]) => {
            if (emp.email === email && emp.password === password) {
                found = { uid, ...emp };
            }
        });
        if (found) {
            // Salvar sessão localmente
            sessionStorage.setItem('employee_user', JSON.stringify(found));
            localStorage.setItem('employee_uid', found.uid);
            window.location.href = 'health-check.html';
        } else {
            showError('Email ou senha incorretos. Verifique seus dados e tente novamente.');
        }
    } catch (e) {
        showError('Erro ao conectar. Verifique sua internet e tente novamente.');
        console.error(e);
    }
}

function showError(msg) {
    const errorBox = document.getElementById('error-box');
    const btn = document.getElementById('btn-entrar');
    errorBox.textContent = '⚠️ ' + msg;
    errorBox.style.display = 'block';
    document.getElementById('loading-box').style.display = 'none';
    btn.disabled = false;
    btn.innerHTML = 'Entrar';
}
</script>

</body>
</html>
