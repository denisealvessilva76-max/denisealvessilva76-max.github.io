<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canteiro Saudável - Painel Administrativo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #16a34a;
            --primary-dark: #15803d;
            --background: #f0fdf4;
            --surface: #ffffff;
            --foreground: #0f172a;
            --muted: #64748b;
            --border: #e2e8f0;
            --success: #22c55e;
            --error: #ef4444;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--background);
            color: var(--foreground);
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%);
            color: white;
            padding: 30px;
            border-radius: 16px;
            margin-bottom: 30px;
            box-shadow: 0 4px 20px rgba(22, 163, 74, 0.25);
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 8px;
        }

        .header p {
            opacity: 0.9;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 2px solid var(--border);
            overflow-x: auto;
        }

        .tab-btn {
            padding: 12px 20px;
            border: none;
            background: transparent;
            color: var(--muted);
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            border-bottom: 3px solid transparent;
            transition: all 0.3s;
        }

        .tab-btn.active {
            color: var(--primary);
            border-bottom-color: var(--primary);
        }

        .tab-content {
            display: none;
            animation: fadeIn 0.3s;
        }

        .tab-content.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .card {
            background: var(--surface);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.06);
            border: 1px solid var(--border);
        }

        .card h2 {
            font-size: 18px;
            margin-bottom: 15px;
            color: var(--foreground);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .stat-box {
            background: linear-gradient(135deg, #dcfce7 0%, #e8f5e9 100%);
            padding: 20px;
            border-radius: 12px;
            text-align: center;
        }

        .stat-value {
            font-size: 28px;
            font-weight: bold;
            color: var(--primary);
        }

        .stat-label {
            font-size: 12px;
            color: var(--muted);
            margin-top: 8px;
        }

        .employee-list {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: var(--background);
            padding: 12px;
            text-align: left;
            font-size: 12px;
            font-weight: 600;
            color: var(--muted);
            border-bottom: 2px solid var(--border);
        }

        td {
            padding: 12px;
            border-bottom: 1px solid var(--border);
        }

        tr:hover {
            background: var(--background);
        }

        .btn {
            padding: 10px 16px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background: var(--primary-dark);
        }

        .btn-secondary {
            background: var(--background);
            color: var(--foreground);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            background: var(--border);
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: var(--muted);
        }

        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .alert {
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
        }

        .alert-error {
            background: #fee2e2;
            color: #991b1b;
            border: 1px solid #fecaca;
        }

        .alert-success {
            background: #dcfce7;
            color: #166534;
            border: 1px solid #bbf7d0;
        }

        .photo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 15px;
        }

        .photo-card {
            background: var(--background);
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.3s;
        }

        .photo-card:hover {
            transform: scale(1.05);
        }

        .photo-card img {
            width: 100%;
            height: 120px;
            object-fit: cover;
        }

        .photo-info {
            padding: 8px;
            font-size: 12px;
            color: var(--muted);
        }

        .login-screen {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #14532d 0%, #166534 100%);
        }

        .login-card {
            background: white;
            padding: 40px;
            border-radius: 16px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .login-card h1 {
            font-size: 24px;
            margin-bottom: 8px;
            color: var(--foreground);
        }

        .login-card p {
            color: var(--muted);
            margin-bottom: 24px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: var(--foreground);
            margin-bottom: 6px;
        }

        .form-group input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 14px;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(22, 163, 74, 0.1);
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="login-screen" class="login-screen">
    <div class="login-card">
        <h1>🌿 Canteiro Saudável</h1>
        <p>Painel Administrativo SESMT</p>
        <div class="form-group">
            <label>Email</label>
            <input type="email" id="login-email" placeholder="admin@canteiro.com" value="admin@canteiro.com">
        </div>
        <div class="form-group">
            <label>Senha</label>
            <input type="password" id="login-password" placeholder="Sua senha" value="admin123">
        </div>
        <button class="btn btn-primary" onclick="handleLogin()" style="width: 100%; margin-top: 20px;">Entrar</button>
        <p id="login-error" style="color: var(--error); margin-top: 12px; font-size: 12px; display: none;"></p>
    </div>
</div>

<!-- DASHBOARD SCREEN -->
<div id="dashboard-screen" class="hidden">
    <div class="container">
        <div class="header">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <div>
                    <h1>🌿 Canteiro Saudável</h1>
                    <p>Painel de Monitoramento de Saúde Ocupacional</p>
                </div>
                <button class="btn btn-secondary" onclick="handleLogout()">Sair</button>
            </div>
        </div>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('dashboard')">📊 Dashboard</button>
            <button class="tab-btn" onclick="switchTab('funcionarios')">👥 Funcionários</button>
            <button class="tab-btn" onclick="switchTab('comunicados')">📢 Comunicados</button>
            <button class="tab-btn" onclick="switchTab('fotos')">📷 Fotos Desafios</button>
        </div>

        <!-- DASHBOARD TAB -->
        <div id="dashboard" class="tab-content active">
            <div class="stats-grid">
                <div class="stat-box">
                    <div class="stat-value" id="stat-employees">0</div>
                    <div class="stat-label">Funcionários Cadastrados</div>
                </div>
                <div class="stat-box">
                    <div class="stat-value" id="stat-checkins">0</div>
                    <div class="stat-label">Check-ins Hoje</div>
                </div>
                <div class="stat-box">
                    <div class="stat-value" id="stat-complaints">0</div>
                    <div class="stat-label">Queixas Registradas</div>
                </div>
                <div class="stat-box">
                    <div class="stat-value" id="stat-pressure">0</div>
                    <div class="stat-label">Pressão Monitorada</div>
                </div>
            </div>

            <div class="card">
                <h2>📈 Atividade Recente</h2>
                <div id="recent-activity" class="loading">
                    <div class="spinner"></div>
                </div>
            </div>
        </div>

        <!-- FUNCIONÁRIOS TAB -->
        <div id="funcionarios" class="tab-content">
            <div class="card">
                <h2>👥 Lista de Funcionários</h2>
                <div id="employees-list" class="employee-list loading">
                    <div class="spinner"></div>
                </div>
            </div>
        </div>

        <!-- COMUNICADOS TAB -->
        <div id="comunicados" class="tab-content">
            <div class="card">
                <h2>📢 Comunicados</h2>
                <button class="btn btn-primary" onclick="showNewCommunicado()" style="margin-bottom: 20px;">+ Novo Comunicado</button>
                <div id="comunicados-list" class="loading">
                    <div class="spinner"></div>
                </div>
            </div>
        </div>

        <!-- FOTOS DESAFIOS TAB -->
        <div id="fotos" class="tab-content">
            <div class="card">
                <h2>📷 Fotos dos Desafios</h2>
                <div id="fotos-list" class="photo-grid loading">
                    <div class="spinner"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- SCRIPTS -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<script>
    // Firebase Config
    const firebaseConfig = {
        apiKey: "AIzaSyB32S5Eac0guxy1herefub70AIAGkgF1Rw",
        authDomain: "canteiro-saudavel.firebaseapp.com",
        databaseURL: "https://canteiro-saudavel-default-rtdb.firebaseio.com",
        projectId: "canteiro-saudavel",
        storageBucket: "canteiro-saudavel.firebasestorage.app",
        messagingSenderId: "37768857073",
        appId: "1:37768857073:web:3e62666713391869813050"
    };

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    let currentUser = null;
    let employeesData = [];
    let comunicadosData = [];
    let fotosData = [];

    // LOGIN
    function handleLogin() {
        const email = document.getElementById('login-email').value;
        const password = document.getElementById('login-password').value;

        if (email === 'admin@canteiro.com' && password === 'admin123') {
            currentUser = { email, name: 'Administrador' };
            localStorage.setItem('admin_user', JSON.stringify(currentUser));
            showDashboard();
        } else {
            document.getElementById('login-error').textContent = 'Email ou senha incorretos';
            document.getElementById('login-error').style.display = 'block';
        }
    }

    function handleLogout() {
        currentUser = null;
        localStorage.removeItem('admin_user');
        document.getElementById('login-screen').classList.remove('hidden');
        document.getElementById('dashboard-screen').classList.add('hidden');
    }

    function showDashboard() {
        document.getElementById('login-screen').classList.add('hidden');
        document.getElementById('dashboard-screen').classList.remove('hidden');
        loadData();
    }

    // DATA LOADING
    function loadData() {
        loadEmployees();
        loadComunicados();
        loadFotos();
    }

    function loadEmployees() {
        const ref = database.ref('canteiro-saudavel/employees');
        ref.on('value', (snapshot) => {
            if (snapshot.exists()) {
                const data = snapshot.val();
                employeesData = Object.keys(data).map(matricula => ({
                    matricula,
                    ...data[matricula].profile
                }));
                updateEmployeesList();
                updateStats();
            }
        });
    }

    function loadComunicados() {
        const ref = database.ref('canteiro-saudavel/comunicados');
        ref.on('value', (snapshot) => {
            if (snapshot.exists()) {
                const data = snapshot.val();
                comunicadosData = Object.keys(data).map(id => ({
                    id,
                    ...data[id]
                }));
                updateComunicadosList();
            } else {
                document.getElementById('comunicados-list').innerHTML = '<p style="color: var(--muted);">Nenhum comunicado publicado ainda.</p>';
            }
        });
    }

    function loadFotos() {
        const ref = database.ref('canteiro-saudavel/challenges');
        ref.on('value', (snapshot) => {
            if (snapshot.exists()) {
                const data = snapshot.val();
                fotosData = [];
                Object.keys(data).forEach(matricula => {
                    const emp = data[matricula];
                    if (emp.challenges) {
                        Object.keys(emp.challenges).forEach(challengeId => {
                            const challenge = emp.challenges[challengeId];
                            if (challenge.photoUrl) {
                                fotosData.push({
                                    photoUrl: challenge.photoUrl,
                                    challengeName: challenge.name || 'Desafio',
                                    matricula,
                                    date: challenge.completedAt
                                });
                            }
                        });
                    }
                });
                updateFotosList();
            } else {
                document.getElementById('fotos-list').innerHTML = '<p style="color: var(--muted); grid-column: 1/-1;">Nenhuma foto enviada ainda.</p>';
            }
        });
    }

    // UPDATE UI
    function updateEmployeesList() {
        const container = document.getElementById('employees-list');
        if (employeesData.length === 0) {
            container.innerHTML = '<p style="color: var(--muted);">Nenhum funcionário cadastrado.</p>';
            return;
        }

        const html = `
            <table>
                <thead>
                    <tr>
                        <th>Matrícula</th>
                        <th>Nome</th>
                        <th>Turno</th>
                        <th>Altura</th>
                        <th>Peso</th>
                    </tr>
                </thead>
                <tbody>
                    ${employeesData.map(emp => `
                        <tr>
                            <td>${emp.matricula}</td>
                            <td>${emp.name || '-'}</td>
                            <td>${emp.turno || '-'}</td>
                            <td>${emp.altura || '-'} cm</td>
                            <td>${emp.peso || '-'} kg</td>
                        </tr>
                    `).join('')}
                </tbody>
            </table>
        `;
        container.innerHTML = html;
    }

    function updateComunicadosList() {
        const container = document.getElementById('comunicados-list');
        if (comunicadosData.length === 0) {
            container.innerHTML = '<p style="color: var(--muted);">Nenhum comunicado publicado.</p>';
            return;
        }

        const html = comunicadosData.map(com => `
            <div class="card">
                <h3>${com.title || 'Sem título'}</h3>
                <p>${com.message || ''}</p>
                ${com.imageUrl ? `<img src="${com.imageUrl}" style="max-width: 100%; border-radius: 8px; margin-top: 10px;">` : ''}
                <p style="font-size: 12px; color: var(--muted); margin-top: 10px;">
                    ${new Date(com.createdAt || 0).toLocaleString('pt-BR')}
                </p>
            </div>
        `).join('');
        container.innerHTML = html;
    }

    function updateFotosList() {
        const container = document.getElementById('fotos-list');
        if (fotosData.length === 0) {
            container.innerHTML = '<p style="color: var(--muted); grid-column: 1/-1;">Nenhuma foto enviada.</p>';
            return;
        }

        const html = fotosData.map(foto => `
            <div class="photo-card">
                <img src="${foto.photoUrl}" alt="${foto.challengeName}" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%22150%22 height=%22120%22><rect fill=%22%23f1f5f9%22/><text x=%2250%25%22 y=%2250%25%22 text-anchor=%22middle%22 dy=%22.3em%22 fill=%22%2394a3b8%22>Sem imagem</text></svg>'">
                <div class="photo-info">
                    <strong>${foto.challengeName}</strong><br>
                    ${new Date(foto.date || 0).toLocaleDateString('pt-BR')}
                </div>
            </div>
        `).join('');
        container.innerHTML = html;
    }

    function updateStats() {
        document.getElementById('stat-employees').textContent = employeesData.length;
        
        let checkins = 0;
        let complaints = 0;
        let pressures = 0;

        employeesData.forEach(emp => {
            if (emp.checkins) checkins += Object.keys(emp.checkins).length;
            if (emp.symptoms) complaints += Object.keys(emp.symptoms).length;
            if (emp.bloodPressure) pressures += Object.keys(emp.bloodPressure).length;
        });

        document.getElementById('stat-checkins').textContent = checkins;
        document.getElementById('stat-complaints').textContent = complaints;
        document.getElementById('stat-pressure').textContent = pressures;
    }

    // TAB SWITCHING
    function switchTab(tabName) {
        document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
        
        document.getElementById(tabName).classList.add('active');
        event.target.classList.add('active');
    }

    function showNewCommunicado() {
        alert('Funcionalidade de criar comunicado será implementada em breve.');
    }

    // INIT
    window.addEventListener('load', () => {
        const stored = localStorage.getItem('admin_user');
        if (stored) {
            currentUser = JSON.parse(stored);
            showDashboard();
        }
    });
</script>

</body>
</html>
